<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual TSN Switch Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .logo-wrap {
      width: 80px; height: 80px;
      background: #2d3748;
      border-radius: 12px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }
    .logo-wrap img { width: 80px; height: 80px; object-fit: contain; border-radius: 12px; }
    h1 { font-size: 1.3rem; color: #63b3ed; margin-bottom: 6px; }
    p  { font-size: 0.85rem; color: #718096; margin-bottom: 28px; }
    input[type=password] {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }
    input[type=password]:focus { border-color: #63b3ed; }
    button {
      width: 100%;
      padding: 12px;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2c5282; }
    .error { color: #fc8181; font-size: 0.85rem; margin-top: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap" id="logo-wrap">⏱</div>
  <h1>Virtual TSN Switch Dashboard</h1>
  <p>Enter password to continue</p>
  <form method="POST">
    <input type="password" name="password" placeholder="Password" autofocus/>
    <button type="submit">Login</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
</div>
<script>
  const img = new Image();
  img.onload = () => {
    const w = document.getElementById('logo-wrap');
    w.innerHTML = '';
    w.style.background = 'none';
    w.appendChild(img);
  };
  img.src = '/static/logo.png';
</script>
</body>
</html>
